<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Заявка — частный автоконтур" />
    <title>Autéllo Barskiy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="ambient__mesh"></div>
      <div class="ambient__orb ambient__orb--1"></div>
      <div class="ambient__orb ambient__orb--2"></div>
      <div class="ambient__orb ambient__orb--3"></div>
    </div>

    <div class="shell">
      <header class="topbar">
        <div class="topbar__inner">
          <div class="brand">
            <p class="brand__title">Autéllo Barskiy</p>
          </div>
          <nav class="nav-actions" aria-label="Навигация">
            <a class="btn btn--ghost" href="/admin/">Служебный вход</a>
          </nav>
        </div>
      </header>

      <main id="main">
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero__inner">
            <p class="hero__eyebrow reveal reveal--1">Private concierge</p>
            <h1 id="hero-title" class="hero__headline reveal reveal--2">
              Заявка на сопровождение
            </h1>
            <div class="hero__rule reveal reveal--3" aria-hidden="true"></div>
          </div>
        </section>

        <section class="section section--form" aria-labelledby="form-title">
          <h2 id="form-title" class="section__title reveal-scroll" style="--reveal-delay: 0ms">
            Данные запроса
          </h2>

          <div class="card card--lux reveal-scroll" style="--reveal-delay: 90ms">
            <div class="card__shine" aria-hidden="true"></div>
            <form id="leadForm" class="form-grid" novalidate>
              <div class="field field--half">
                <label class="field__label" for="serviceSelect">Услуга</label>
                <select id="serviceSelect" name="service_id" required>
                  <option value="" disabled selected>Загрузка…</option>
                </select>
              </div>

              <div class="field field--half">
                <label class="field__label" for="budgetRange">Ориентир бюджета</label>
                <div class="range">
                  <div class="range__meta">
                    <span class="range__value" id="budgetLabelOut">—</span>
                  </div>
                  <input id="budgetRange" type="range" min="0" max="8" value="3" />
                  <input type="hidden" id="budgetLabel" name="budget_label" />
                </div>
              </div>

              <div class="field field--half">
                <label class="field__label" for="first_name">Имя</label>
                <input id="first_name" name="first_name" type="text" autocomplete="given-name" required />
              </div>
              <div class="field field--half">
                <label class="field__label" for="last_name">Фамилия</label>
                <input id="last_name" name="last_name" type="text" autocomplete="family-name" required />
              </div>
              <div class="field field--half">
                <label class="field__label" for="middle_name">Отчество</label>
                <input id="middle_name" name="middle_name" type="text" autocomplete="additional-name" />
              </div>

              <div class="field field--half">
                <label class="field__label" for="role_type">Роль</label>
                <select id="role_type" name="role_type">
                  <option value="">—</option>
                  <option value="employee">Сотрудник</option>
                  <option value="manager">Руководитель / владелец</option>
                </select>
              </div>

              <div class="field">
                <label class="field__label" for="business_info">О бизнесе</label>
                <textarea id="business_info" name="business_info"></textarea>
              </div>

              <div class="field field--half">
                <label class="field__label" for="business_niche">Ниша</label>
                <input id="business_niche" name="business_niche" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="company_size">Размер компании</label>
                <input id="company_size" name="company_size" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="business_scale">Масштаб бизнеса</label>
                <input id="business_scale" name="business_scale" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="task_scope">Объём задачи</label>
                <input id="task_scope" name="task_scope" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="need_scope">Объём потребности</label>
                <input id="need_scope" name="need_scope" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="task_category">Тип задачи</label>
                <input id="task_category" name="task_category" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="product_interest">Продукт / интерес</label>
                <input id="product_interest" name="product_interest" type="text" />
              </div>
              <div class="field field--half">
                <label class="field__label" for="result_deadline">Срок результата</label>
                <input id="result_deadline" name="result_deadline" type="text" />
              </div>

              <div class="field field--half">
                <label class="field__label" for="preferred_contact_method">Способ связи</label>
                <select id="preferred_contact_method" name="preferred_contact_method">
                  <option value="">—</option>
                  <option value="phone">Телефон</option>
                  <option value="telegram">Telegram</option>
                  <option value="whatsapp">WhatsApp</option>
                  <option value="email">Email</option>
                </select>
              </div>
              <div class="field field--half">
                <label class="field__label" for="convenient_contact_time">Удобное время</label>
                <input id="convenient_contact_time" name="convenient_contact_time" type="text" />
              </div>

              <div class="field">
                <label class="field__label" for="comments">Комментарии</label>
                <textarea id="comments" name="comments"></textarea>
              </div>

              <div class="field">
                <div class="actions">
                  <button type="submit" class="btn btn--primary" data-track="1">Отправить</button>
                  <button type="reset" class="btn btn--ghost">Сбросить</button>
                </div>
                <p id="formStatus" class="status" role="status" aria-live="polite"></p>
              </div>
            </form>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__inner">
          <span class="footer__mark">Autéllo · Barskiy</span>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
