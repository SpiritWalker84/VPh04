# Единая точка входа HTTP для внешнего контура (по умолчанию без TLS).
# Запросы /api/ после появления сервиса backend проксируются на backend:8000.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Прокси на контейнер backend (имя сервиса в docker-compose). Пока сервис закомментирован —
    # ответ будет 502; после раскомментирования backend маршрут заработает без смены конфига.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://$backend_upstream;
    }
}
