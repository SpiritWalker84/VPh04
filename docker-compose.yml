# Запуск: docker compose up -d
# Пересборка всего стека: docker compose build && docker compose up -d
# Образ nginx собирает фронтенд внутри себя (docker/web/Dockerfile); отдельно npm run build на хосте не обязателен.
# Требуется Docker Compose v2 (плагин: docker compose), не устаревший бинарь docker-compose.

name: vph04

services:
  postgres:
    image: postgres:16-alpine
    container_name: vph04-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: vph04-web:latest
    container_name: vph04-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vph04-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  # Сервис приложения был здесь закомментирован — теперь используется блок `backend` выше.

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
